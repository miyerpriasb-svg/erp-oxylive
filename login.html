<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso ERP Oxylive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="styles.css?v=oxylive-brand-1" rel="stylesheet">
</head>
<body>
    <main class="login-layout">
        <section class="login-panel">
            <div class="login-box">
                <div class="brand mb-4">
                    <div class="brand-logo-wrap brand-logo-wrap-light"><img class="brand-logo" src="assets/oxylive-logo.png" alt="Oxylive"></div>
                    <div>
                        <p class="brand-title text-dark">Oxylive Service LLC</p>
                        <p class="brand-subtitle text-muted">ERP operativo y administrativo</p>
                    </div>
                </div>

                <p class="metric-label mb-2">Acceso centralizado</p>
                <h1 class="fw-bold mb-2">Control operativo Oxylive</h1>
                <p class="text-muted mb-4">Ingresa una vez. El ERP abre automaticamente el espacio administrativo u operativo segun el rol asignado.</p>

                <form id="loginForm" class="d-grid gap-3" autocomplete="on">
                    <div>
                        <label class="form-label" for="usuario">Usuario</label>
                        <input class="form-control" id="usuario" autocomplete="username" required autofocus>
                    </div>
                    <div>
                        <label class="form-label" for="password">Contrasena</label>
                        <input class="form-control" id="password" type="password" autocomplete="current-password" required>
                    </div>
                    <button class="btn btn-dark w-100" id="btnLogin" type="submit">Ingresar</button>
                    <div id="loginError" class="alert alert-danger py-2 mb-0 d-none"></div>
                </form>

                <div class="window mt-4">
                    <div class="window-body">
                        <div class="d-flex align-items-center justify-content-between gap-3">
                            <div>
                                <p class="fw-bold mb-1">Usuarios administrados</p>
                                <p class="text-muted small mb-0">Los accesos se crean y modifican desde Gestion de Equipo.</p>
                            </div>
                            <span class="pill pill-blue">Seguro</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="login-visual">
            <img class="login-logo-watermark" src="assets/oxylive-logo.png" alt="Oxylive">
        </section>
    </main>

    <script>
        const SESSION_KEY = 'oxyliveSession';

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const error = document.getElementById('loginError');
            const button = document.getElementById('btnLogin');
            error.classList.add('d-none');
            button.disabled = true;
            button.textContent = 'Validando...';

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usuario: document.getElementById('usuario').value.trim(),
                        password: document.getElementById('password').value
                    })
                });

                if (!response.ok) throw new Error('Usuario o contrasena incorrectos.');

                const session = await response.json();
                localStorage.setItem(SESSION_KEY, JSON.stringify(session));
                window.location.href = session.redirect || '/admin';
            } catch (err) {
                error.textContent = err.message || 'No fue posible iniciar sesion.';
                error.classList.remove('d-none');
                button.disabled = false;
                button.textContent = 'Ingresar';
            }
        });
    </script>
</body>
</html>
